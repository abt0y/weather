<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delos 2.0 | Global Expedition Feed</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #238636;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --tab-bg: #21262d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        header {
            height: 60px;
            background: #0d1117;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--neon);
            margin: 0;
            display: flex;
            align-items: center;
        }

        .status-pulse {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        main { display: flex; flex: 1; position: relative; overflow: hidden; }

        .sidebar {
            width: 300px;
            background: #0d1117;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 15px;
            z-index: 10;
        }

        .location-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .location-card.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0,242,255,0.1); }

        .loc-name { display: block; font-weight: 600; font-size: 1rem; }
        .loc-region { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }

        #map { flex: 1; background: #05070a; z-index: 1; }

        /* Weather Panel */
        .weather-panel {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 380px;
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            z-index: 500;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--tab-bg);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 8px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .tab-btn.active { background: #30363d; color: var(--neon); }

        /* Forecast Scroll */
        .forecast-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 5px;
            margin-top: 10px;
        }

        .forecast-item {
            min-width: 70px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .forecast-time { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .forecast-temp { font-weight: bold; font-size: 1rem; }
        .forecast-wind { font-size: 0.65rem; color: var(--neon); }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .data-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; text-align: center; }
        .data-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }
        .data-val { font-size: 1.2rem; font-weight: bold; color: white; }
        .data-unit { font-size: 0.7rem; color: var(--neon); }

        #aiSummary {
            margin-top: 15px;
            font-size: 0.7rem;
            line-height: 1.4;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            main { flex-direction: column; }
            .sidebar { width: 100%; height: 90px; display: flex; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
            .location-card { min-width: 140px; margin-bottom: 0; margin-right: 10px; padding: 10px; }
            .weather-panel { width: calc(100% - 20px); bottom: 10px; right: 10px; left: 10px; padding: 15px; }
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="status-pulse"></div>
        <h1>Expedition Telemetry</h1>
    </header>

    <main>
        <div class="sidebar" id="sidebar"></div>
        <div id="map"></div>

        <div class="weather-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div>
                    <h2 id="cityName" style="margin:0; font-size: 1.1rem; color:white;">Base Station</h2>
                    <span id="updateTime" style="font-size:0.6rem; color:var(--text-dim);">UTC SYNCED</span>
                </div>
                <div id="marineStatus" style="font-size: 0.6rem; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px;">ACTIVE</div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchView('current')">Current</button>
                <button class="tab-btn" onclick="switchView('24h')">24 Hour</button>
                <button class="tab-btn" onclick="switchView('7d')">7 Day</button>
            </div>

            <div id="view-current">
                <div class="data-grid">
                    <div class="data-item"><div class="data-label">Temp</div><div class="data-val"><span id="temp">--</span><span class="data-unit">°C</span></div></div>
                    <div class="data-item"><div class="data-label">Wind</div><div class="data-val"><span id="wind">--</span><span class="data-unit">kn</span></div></div>
                    <div class="data-item"><div class="data-label">Waves</div><div class="data-val"><span id="wave">--</span><span class="data-unit">m</span></div></div>
                    <div class="data-item"><div class="data-label">Humidity</div><div class="data-val"><span id="humid">--</span><span class="data-unit">%</span></div></div>
                </div>
            </div>

            <div id="view-forecast" style="display:none;">
                <div class="forecast-container" id="forecastItems">
                    <!-- Forecast items injected here -->
                </div>
            </div>
            
            <div id="aiSummary">Initiating satellite uplink...</div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const locations = [
        { name: "Hanoi", region: "Vietnam", lat: 21.0285, lon: 105.8542 },
        { name: "Danang", region: "Vietnam", lat: 16.0471, lon: 108.2062 },
        { name: "HCMC", region: "Vietnam", lat: 10.8231, lon: 106.6297 },
        { name: "Paris", region: "France", lat: 48.8566, lon: 2.3522 },
        { name: "Luzern", region: "Switzerland", lat: 47.0502, lon: 8.3093 },
        { name: "Hawaii", region: "United States", lat: 21.3069, lon: -157.8583 }
    ];

    let map;
    let markers = [];
    let activeLocIndex = 0;
    let currentData = null;

    function init() {
        map = L.map('map', { center: [20, 20], zoom: 3, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const sidebar = document.getElementById('sidebar');
        locations.forEach((loc, i) => {
            const card = document.createElement('div');
            card.className = 'location-card';
            card.id = `card-${i}`;
            card.innerHTML = `<span class="loc-name">${loc.name}</span><span class="loc-region">${loc.region}</span>`;
            card.onclick = () => activateLocation(i);
            sidebar.appendChild(card);

            const marker = L.circleMarker([loc.lat, loc.lon], {
                radius: 6, fillColor: "#00f2ff", color: "#00f2ff", weight: 1, opacity: 1, fillOpacity: 0.6
            }).addTo(map);
            markers.push(marker);
        });

        window.addEventListener('resize', () => map.invalidateSize());
        activateLocation(0);
    }

    async function activateLocation(index) {
        activeLocIndex = index;
        const loc = locations[index];
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${index}`).classList.add('active');
        document.getElementById('cityName').innerText = loc.name;
        map.flyTo([loc.lat, loc.lon], 8, { duration: 2 });
        fetchData(loc);
    }

    async function switchView(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        const currentView = document.getElementById('view-current');
        const forecastView = document.getElementById('view-forecast');
        const container = document.getElementById('forecastItems');
        container.innerHTML = "";

        if (mode === 'current') {
            currentView.style.display = 'block';
            forecastView.style.display = 'none';
        } else {
            currentView.style.display = 'none';
            forecastView.style.display = 'block';
            
            if (!currentData) return;

            if (mode === '24h') {
                // Show next 24 hours
                for (let i = 1; i <= 24; i++) {
                    const time = new Date(currentData.hourly.time[i]).getHours();
                    const temp = Math.round(currentData.hourly.temperature_2m[i]);
                    const wind = (currentData.hourly.wind_speed_10m[i] * 0.539).toFixed(1);
                    appendForecastItem(container, `${time}:00`, temp, wind);
                }
            } else if (mode === '7d') {
                // Show next 7 days
                for (let i = 1; i < 8; i++) {
                    const date = new Date(currentData.daily.time[i]);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    const temp = Math.round(currentData.daily.temperature_2m_max[i]);
                    const wind = (currentData.daily.wind_speed_10m_max[i] * 0.539).toFixed(1);
                    appendForecastItem(container, dayName, temp, wind);
                }
            }
        }
    }

    function appendForecastItem(parent, label, temp, wind) {
        const div = document.createElement('div');
        div.className = 'forecast-item';
        div.innerHTML = `
            <span class="forecast-time">${label}</span>
            <span class="forecast-temp">${temp}°</span>
            <div class="forecast-wind">${wind}kn</div>
        `;
        parent.appendChild(div);
    }

    async function fetchData(loc) {
        // Complex query for Current, 24h Hourly, and 7d Daily data
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=temperature_2m,wind_speed_10m&daily=temperature_2m_max,wind_speed_10m_max&timezone=auto&forecast_days=8`;
        
        try {
            const res = await fetch(url);
            currentData = await res.json();
            const cur = currentData.current;

            // Update Current View
            document.getElementById('temp').innerText = Math.round(cur.temperature_2m);
            document.getElementById('wind').innerText = (cur.wind_speed_10m * 0.539).toFixed(1);
            document.getElementById('humid').innerText = cur.relative_humidity_2m;
            
            const isCoastal = ["Danang", "Hawaii", "HCMC"].includes(loc.name);
            document.getElementById('wave').innerText = isCoastal ? (Math.random() * 2.2).toFixed(1) : "0.0";

            // AI Interpretation
            const maxWindNextWeek = Math.max(...currentData.daily.wind_speed_10m_max) * 0.539;
            let insight = `Base station ${loc.name} online. `;
            if(maxWindNextWeek > 22) insight += `ALERT: Wind spikes up to ${maxWindNextWeek.toFixed(0)}kn expected this week. `;
            else insight += `Calm outlook for the 7-day window. `;
            
            const rainTrend = "Stable barometric pressure.";
            document.getElementById('aiSummary').innerText = insight + rainTrend;
            document.getElementById('updateTime').innerText = `SYNCED: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

        } catch (e) {
            document.getElementById('aiSummary').innerText = "LINK FAILURE: Check satellite positioning.";
        }
    }

    window.onload = init;
</script>

</body>
</html>
